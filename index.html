<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hood Alchemist Savior</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#070707;color:#f6ead2;font-family:Arial;padding:20px}
h1{color:#d6a84f}
.herb{border:1px solid #d6a84f;padding:20px;margin:15px;border-radius:12px}
button{padding:10px 15px;margin:5px;border-radius:20px;border:none;cursor:pointer}
.top{background:#d6a84f;color:#111}
.all{background:#333;color:#fff}
</style>
</head>

<body>

<h1>🌿 Hood Alchemist Savior</h1>

<button class="top" onclick="showTop()">Top Starter Herbs</button>
<button class="all" onclick="showAll()">Show All Herbs</button>

<h3 id="count"></h3>

<div id="herbs"></div>

<script>
const SUPABASE_URL = "https://bhjscvvoncakmtekwtyw.supabase.co";
const SUPABASE_KEY = "sb_publishable_QRd-mc4YEI9o_haMP9s6bg_YSP96CrC";

const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let HERBS = [];
let mode = "top";

const TOP = [
"Alfalfa","Ashwagandha","Burdock Root","Calendula","Chamomile",
"Dandelion","Echinacea","Elderberry","Garlic","Ginger",
"Hibiscus","Lavender","Lemon Balm","Mullein","Nettle",
"Oregano","Peppermint","Plantain","Turmeric","Yarrow"
];

async function load(){
  const {data} = await supa.from("herbs_300").select("*");
  HERBS = data || [];
  render();
}

function showTop(){
  mode="top";
  render();
}

function showAll(){
  mode="all";
  render();
}

function render(){
  let list = HERBS;

  if(mode==="top"){
    list = HERBS.filter(h => TOP.includes(h.name));
  }

  document.getElementById("count").innerText =
    list.length + " showing / " + HERBS.length + " total";

  document.getElementById("herbs").innerHTML =
    list.map(h=>`
      <div class="herb">
        <h2>${h.name}</h2>
        <p>${h.benefits || ""}</p>

        <h4>🌱 Grow Guide</h4>
        <p><b>Latin:</b> ${h.latin_name || "Not added"}</p>
        <p><b>Sun:</b> ${h.sun_requirements || "Not added"}</p>
        <p><b>Zones:</b> ${h.usda_zones || "Not added"}</p>
        <p><b>Germination:</b> ${h.germination_time || "Not added"}</p>
        <p><b>Harvest:</b> ${h.harvest_time || "Not added"}</p>
        <p><b>Height:</b> ${h.plant_height || "Not added"}</p>
        <p><b>Depth:</b> ${h.planting_depth || "Not added"}</p>

        <h4>🌙 Moon System</h4>
        <p><b>Planting:</b> ${h.moon_phase_planting || "Not added"}</p>
        <p><b>Energy:</b> ${h.plant_type_energy || "Not added"}</p>
      </div>
    `).join("");
}

load();
</script>

</body>
</html>

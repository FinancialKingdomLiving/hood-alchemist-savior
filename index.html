<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hood Alchemist Savior</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#070707;color:#f6ead2;font-family:Arial;padding:20px}
h1{color:#d6a84f}
button{padding:10px 15px;margin:5px;cursor:pointer}
.herb{border:1px solid #d6a84f;padding:10px;margin:10px 0}
</style>
</head>

<body>

<h1>🔥 Top Starter Herb System</h1>

<button onclick="showTop()">Top Starter Herbs</button>
<button onclick="showAll()">Show All 310</button>

<div id="count"></div>
<div id="herbs"></div>

<script>
const SUPABASE_URL = "https://bhjscvvoncakmtekwtyw.supabase.co";
const SUPABASE_KEY = "sb_publishable_QRd-mc4YEI9o_haMP9s6bg_YSP96CrC";

const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let HERBS = [];
let mode = "top";

const TOP = [
"Alfalfa","Ashwagandha","Burdock Root","Calendula","Chamomile",
"Dandelion","Echinacea","Elderberry","Garlic","Ginger",
"Hibiscus","Lavender","Lemon Balm","Mullein","Nettle",
"Oregano","Peppermint","Plantain","Turmeric","Yarrow"
];

async function load(){
  const {data} = await supa.from("herbs_300").select("*");
  HERBS = data || [];
  render();
}

function showTop(){
  mode="top";
  render();
}

function showAll(){
  mode="all";
  render();
}

function render(){
  let list = HERBS;

  if(mode==="top"){
    list = HERBS.filter(h => TOP.includes(h.name));
  }

  document.getElementById("count").innerText =
    list.length + " showing / " + HERBS.length + " total";

  document.getElementById("herbs").innerHTML =
    list.map(h=>`
      <div class="herb">
        <h3>${h.name}</h3>
        <p>${h.benefits || ""}</p>
      </div>
    `).join("");
}

load();
</script>

</body>
</html>
